kind = "web"
previewPath = "/"
title = "FEED THE FROG"
version = "1.0.0"
id = "artifacts/feed-the-frog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25749

[services.development]
run = "pnpm --filter @workspace/feed-the-frog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/feed-the-frog", "run", "build" ]
publicDir = "artifacts/feed-the-frog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25749"
BASE_PATH = "/"
